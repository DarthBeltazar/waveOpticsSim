name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: OpticsSimulation-linux.zip
            fx_suffix: linux
            fx_arch: x64
          - os: windows-latest
            artifact_name: OpticsSimulation-windows.zip
            fx_suffix: win
            fx_arch: x64
          - os: macos-latest
            artifact_name: OpticsSimulation-macos.zip
            fx_suffix: mac
            fx_arch: aarch64

    env:
      JAVA_VERSION: 21
      FX_VERSION: 21.0.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache JavaFX SDK (built from Maven Central)
        id: cache-javafx
        uses: actions/cache@v4
        with:
          path: javafx-sdk
          key: javafx-${{ env.FX_VERSION }}-${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}

      - name: Build JavaFX SDK from Maven Central (if not cached)
        if: steps.cache-javafx.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p javafx-sdk/lib
          cd javafx-sdk/lib

          MODULES="base controls graphics"
          FX_VERSION="${{ env.FX_VERSION }}"
          PLATFORM="${{ matrix.fx_suffix }}"
          ARCH="${{ matrix.fx_arch }}"

          # Определяем классификатор для платформенно-зависимых JAR
          case "$PLATFORM" in
            win)
              CLASSIFIER="win"
              ;;
            linux)
              CLASSIFIER="linux"
              ;;
            mac)
              if [ "$ARCH" = "aarch64" ]; then
                CLASSIFIER="mac-aarch64"
              else
                CLASSIFIER="mac"
              fi
              ;;
            *)
              CLASSIFIER="$PLATFORM"
              ;;
          esac

          for MODULE in $MODULES; do
            # Основной JAR (без платформы)
            JAR_MAIN="javafx-${MODULE}-${FX_VERSION}.jar"
            URL_MAIN="https://repo1.maven.org/maven2/org/openjfx/javafx-${MODULE}/${FX_VERSION}/${JAR_MAIN}"
            echo "Downloading $URL_MAIN"
            curl -L -o "$JAR_MAIN" "$URL_MAIN"
            if [ ! -s "$JAR_MAIN" ]; then
              echo "Error: failed to download $JAR_MAIN"
              exit 1
            fi

            # Платформенно-зависимый JAR
            JAR_PLATFORM="javafx-${MODULE}-${FX_VERSION}-${CLASSIFIER}.jar"
            URL_PLATFORM="https://repo1.maven.org/maven2/org/openjfx/javafx-${MODULE}/${FX_VERSION}/${JAR_PLATFORM}"
            echo "Downloading $URL_PLATFORM"
            curl -L -o "$JAR_PLATFORM" "$URL_PLATFORM"
            if [ ! -s "$JAR_PLATFORM" ]; then
              echo "Error: failed to download $JAR_PLATFORM"
              exit 1
            fi
          done

          cd ../..
          echo "JavaFX SDK built successfully in javafx-sdk/"

      - name: Grant execute permission for gradlew (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Fat JAR
        shell: bash
        run: ./gradlew clean jar

      - name: Prepare paths for jpackage
        id: paths
        shell: bash
        run: |
          JAR_NAME=$(ls build/libs/*.jar | head -n1)
          echo "jar_name=${JAR_NAME##*/}" >> $GITHUB_OUTPUT
          echo "fx_lib=$(pwd)/javafx-sdk/lib" >> $GITHUB_OUTPUT

      - name: Create portable app with jpackage
        shell: bash
        run: |
          mkdir -p build/jpackage
          jpackage \
            --input build/libs \
            --main-jar ${{ steps.paths.outputs.jar_name }} \
            --main-class com.optics.simulation.ui.SimulationFX \
            --module-path "${{ steps.paths.outputs.fx_lib }}" \
            --add-modules javafx.controls,javafx.graphics \
            --name OpticsSimulation \
            --type app-image \
            --dest build/jpackage \
            --verbose

          if [ ! -d "build/jpackage/OpticsSimulation" ] && [ ! -d "build/jpackage/OpticsSimulation.app" ]; then
            echo "Error: jpackage did not create expected output directory."
            echo "Contents of build/jpackage:"
            ls -la build/jpackage || true
            exit 1
          fi

      - name: List files after jpackage (diagnostic)
        shell: bash
        run: |
          echo "Contents of build/jpackage:"
          ls -la build/jpackage

      - name: Prepare app folder for packaging
        shell: bash
        run: |
          if [ -d "build/jpackage/OpticsSimulation" ]; then
            mv build/jpackage/OpticsSimulation .
          elif [ -d "build/jpackage/OpticsSimulation.app" ]; then
            mv build/jpackage/OpticsSimulation.app OpticsSimulation
          else
            echo "Error: Could not find OpticsSimulation or OpticsSimulation.app in build/jpackage"
            exit 1
          fi

      - name: Zip portable app (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Zip portable app (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          ls -la artifacts
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}