name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            fx_suffix: linux
            fx_arch: x64
            jpackage_type: app-image
            artifact_name: OpticsSimulation-linux.zip
          - os: windows-latest
            platform: win
            fx_suffix: win
            fx_arch: x64
            jpackage_type: app-image
            artifact_name: OpticsSimulation-windows.zip
          - os: macos-latest
            platform: mac
            fx_suffix: osx
            fx_arch: x64
            jpackage_type: app-image
            artifact_name: OpticsSimulation-macos.zip

    env:
      JAVA_VERSION: 21
      JAVA_DISTRO: temurin
      FX_VERSION: 21.0.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: gradle

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache JavaFX SDK
        id: cache-javafx
        uses: actions/cache@v4
        with:
          path: javafx-sdk-${{ env.FX_VERSION }}
          key: javafx-${{ env.FX_VERSION }}-${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}

      - name: Download and extract JavaFX SDK (Windows)
        if: runner.os == 'Windows' && steps.cache-javafx.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://download2.gluonhq.com/openjfx/$env:FX_VERSION/openjfx-$env:FX_VERSION_${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}_bin-sdk.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile javafx-sdk.zip
          if (-not (Test-Path javafx-sdk.zip) -or (Get-Item javafx-sdk.zip).Length -eq 0) {
            Write-Error "Download failed or empty file"
            exit 1
          }
          Expand-Archive -Path javafx-sdk.zip -DestinationPath .
          Remove-Item javafx-sdk.zip
          if (-not (Test-Path "javafx-sdk-$env:FX_VERSION")) {
            Write-Error "JavaFX SDK not extracted correctly"
            exit 1
          }

      - name: Download and extract JavaFX SDK (Unix)
        if: runner.os != 'Windows' && steps.cache-javafx.outputs.cache-hit != 'true'
        shell: bash
        run: |
          FX_URL="https://download2.gluonhq.com/openjfx/${{ env.FX_VERSION }}/openjfx-${{ env.FX_VERSION }}_${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}_bin-sdk.zip"
          echo "Downloading $FX_URL"
          curl -L -o javafx-sdk.zip "$FX_URL"
          if [ ! -s javafx-sdk.zip ]; then
            echo "Error: downloaded file is empty"
            exit 1
          fi
          unzip -q javafx-sdk.zip -d .
          rm javafx-sdk.zip
          if [ ! -d "javafx-sdk-${{ env.FX_VERSION }}" ]; then
            echo "Error: JavaFX SDK not extracted properly"
            exit 1
          fi

      - name: Grant execute permission for gradlew (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Fat JAR
        shell: bash
        run: ./gradlew clean jar

      - name: Prepare paths for jpackage
        id: paths
        shell: bash
        run: |
          JAR_NAME=$(ls build/libs/*.jar | head -n1)
          echo "jar_name=${JAR_NAME##*/}" >> $GITHUB_OUTPUT
          echo "fx_lib=$(pwd)/javafx-sdk-${{ env.FX_VERSION }}/lib" >> $GITHUB_OUTPUT

      - name: Create portable app with jpackage
        shell: bash
        run: |
          mkdir -p build/jpackage
          jpackage \
            --input build/libs \
            --main-jar ${{ steps.paths.outputs.jar_name }} \
            --main-class com.optics.simulation.ui.SimulationFX \
            --module-path "${{ steps.paths.outputs.fx_lib }}" \
            --add-modules javafx.controls,javafx.graphics \
            --name OpticsSimulation \
            --type ${{ matrix.jpackage_type }} \
            --dest build/jpackage \
            --verbose
          if [ ! -d "build/jpackage/OpticsSimulation" ] && [ ! -d "build/jpackage/OpticsSimulation.app" ]; then
            echo "Error: jpackage did not create expected output directory."
            echo "Contents of build/jpackage:"
            ls -la build/jpackage || true
            exit 1
          fi

      - name: List files after jpackage (diagnostic)
        shell: bash
        run: |
          echo "Contents of build/jpackage:"
          ls -la build/jpackage

      - name: Prepare app folder for packaging
        shell: bash
        run: |
          if [ -d "build/jpackage/OpticsSimulation" ]; then
            mv build/jpackage/OpticsSimulation .
          elif [ -d "build/jpackage/OpticsSimulation.app" ]; then
            mv build/jpackage/OpticsSimulation.app OpticsSimulation
          else
            echo "Error: Could not find OpticsSimulation or OpticsSimulation.app in build/jpackage"
            exit 1
          fi

      - name: Zip portable app (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Zip portable app (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error