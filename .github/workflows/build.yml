name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Fat JAR
        run: ./gradlew clean jar
        shell: bash

      - name: Get JAR name
        id: jar_name
        run: echo "JAR_FILE=$(ls build/libs/*.jar | head -n1)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download JavaFX SDK
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_windows-x64_bin-sdk.zip
          elif [ "$RUNNER_OS" == "macOS" ]; then
            curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip
          elif [ "$RUNNER_OS" == "Linux" ]; then
            curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_linux-x64_bin-sdk.zip
          fi
          unzip javafx.zip -d javafx-sdk
        shell: bash

      - name: Create app-image with jpackage
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            JPACKAGE_CMD=jpackage
            MODULE_PATH="$(pwd)/javafx-sdk/javafx-sdk-21/lib"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            JPACKAGE_CMD=jpackage
            MODULE_PATH="$(pwd)/javafx-sdk/javafx-sdk-21/lib"
          else
            JPACKAGE_CMD=jpackage
            MODULE_PATH="$(pwd)/javafx-sdk/javafx-sdk-21/lib"
          fi
          $JPACKAGE_CMD --input build/libs \
            --main-jar $(basename ${{ steps.jar_name.outputs.JAR_FILE }}) \
            --main-class com.optics.simulation.ui.SimulationFX \
            --module-path "$MODULE_PATH" \
            --add-modules javafx.controls,javafx.graphics \
            --name OpticsSimulation \
            --type app-image \
            --app-version 1.0 \
            --dest ./artifacts
        shell: bash

      - name: Archive app-image
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a -tzip OpticsSimulation-windows.zip ./artifacts/OpticsSimulation
          else
            zip -r OpticsSimulation-${{ runner.os }}.zip ./artifacts/OpticsSimulation
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpticsSimulation-${{ runner.os }}
          path: OpticsSimulation-${{ runner.os }}.zip