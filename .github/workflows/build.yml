name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            fx_arch: x64
            fx_suffix: linux
            jpackage_type: app-image
            artifact_name: OpticsSimulation-linux.zip
          - os: windows-latest
            platform: win
            fx_arch: x64
            fx_suffix: win
            jpackage_type: app-image
            artifact_name: OpticsSimulation-windows.zip
          - os: macos-latest
            platform: mac
            fx_arch: aarch64
            fx_suffix: osx
            jpackage_type: app-image
            artifact_name: OpticsSimulation-macos.zip

    env:
      JAVA_VERSION: 21
      JAVA_DISTRO: temurin
      FX_VERSION: 21.0.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: gradle

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache JavaFX SDK (from GitHub Releases)
        id: cache-javafx
        uses: actions/cache@v4
        with:
          path: javafx-sdk
          key: javafx-${{ env.FX_VERSION }}-${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}

      - name: Download and extract JavaFX SDK from Maven Central (if not cached)
        if: steps.cache-javafx.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p javafx-sdk/lib
          cd javafx-sdk/lib

          MODULES="base controls graphics media web"
          FX_VERSION="${{ env.FX_VERSION }}"
          PLATFORM="${{ matrix.fx_suffix }}"
          ARCH="${{ matrix.fx_arch }}"

          for MODULE in $MODULES; do
            # Платформенно-зависимый JAR (содержит нативные библиотеки)
            JAR="javafx-${MODULE}-${FX_VERSION}-${PLATFORM}-${ARCH}.jar"
            URL="https://repo1.maven.org/maven2/org/openjfx/javafx-${MODULE}/${FX_VERSION}/${JAR}"
            echo "Downloading $URL"
            curl -L -o "$JAR" "$URL"
            if [ ! -s "$JAR" ]; then
              echo "Error: failed to download $JAR"
              exit 1
            fi
          done

          cd ../..
          echo "JavaFX SDK built successfully"
      - name: Grant execute permission for gradlew (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Fat JAR
        shell: bash
        run: ./gradlew clean jar

      - name: Prepare paths for jpackage
        id: paths
        shell: bash
        run: |
          JAR_NAME=$(ls build/libs/*.jar | head -n1)
          echo "jar_name=${JAR_NAME##*/}" >> $GITHUB_OUTPUT
          echo "fx_lib=$(pwd)/javafx-sdk/lib" >> $GITHUB_OUTPUT

      - name: Create portable app with jpackage
        shell: bash
        run: |
          mkdir -p build/jpackage
          jpackage \
            --input build/libs \
            --main-jar ${{ steps.paths.outputs.jar_name }} \
            --main-class com.optics.simulation.ui.SimulationFX \
            --module-path "${{ steps.paths.outputs.fx_lib }}" \
            --add-modules javafx.controls,javafx.graphics \
            --name OpticsSimulation \
            --type ${{ matrix.jpackage_type }} \
            --dest build/jpackage \
            --verbose
          if [ ! -d "build/jpackage/OpticsSimulation" ] && [ ! -d "build/jpackage/OpticsSimulation.app" ]; then
            echo "Error: jpackage did not create expected output directory."
            echo "Contents of build/jpackage:"
            ls -la build/jpackage || true
            exit 1
          fi

      - name: List files after jpackage (diagnostic)
        shell: bash
        run: |
          echo "Contents of build/jpackage:"
          ls -la build/jpackage

      - name: Prepare app folder for packaging
        shell: bash
        run: |
          if [ -d "build/jpackage/OpticsSimulation" ]; then
            mv build/jpackage/OpticsSimulation .
          elif [ -d "build/jpackage/OpticsSimulation.app" ]; then
            mv build/jpackage/OpticsSimulation.app OpticsSimulation
          else
            echo "Error: Could not find OpticsSimulation or OpticsSimulation.app in build/jpackage"
            exit 1
          fi

      - name: Zip portable app (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Zip portable app (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error