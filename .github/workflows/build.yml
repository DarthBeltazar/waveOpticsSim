name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            fx_suffix: linux
            fx_arch: x64
            fx_ext: tar.gz
            jpackage_type: app-image
            artifact_name: OpticsSimulation-linux.zip
          - os: windows-latest
            platform: win
            fx_suffix: windows
            fx_arch: x64
            fx_ext: zip
            jpackage_type: app-image
            artifact_name: OpticsSimulation-windows.zip
          - os: macos-latest
            platform: mac
            fx_suffix: macos
            fx_arch: aarch64
            fx_ext: tar.gz
            jpackage_type: dmg
            artifact_name: OpticsSimulation-macos-arm64.dmg

    env:
      JAVA_VERSION: 21
      JAVA_DISTRO: temurin
      FX_VERSION: 21.0.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: gradle

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache JavaFX SDK (Oracle builds)
        id: cache-javafx
        uses: actions/cache@v4
        with:
          path: javafx-sdk-${{ env.FX_VERSION }}
          key: javafx-oracle-${{ env.FX_VERSION }}-${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}

      - name: Download and extract JavaFX SDK (Oracle)
        if: steps.cache-javafx.outputs.cache-hit != 'true'
        shell: bash
        run: |
          BASE_URL="https://download.java.net/java/GA/javafx${{ env.FX_VERSION }}/0dc89a29ffa34addbe3057926acea09a/GPL"
          FILE_NAME="openjfx-${{ env.FX_VERSION }}_${{ matrix.fx_suffix }}-${{ matrix.fx_arch }}_bin-sdk.${{ matrix.fx_ext }}"
          DOWNLOAD_URL="$BASE_URL/$FILE_NAME"
          
          echo "Downloading JavaFX SDK from: $DOWNLOAD_URL"
          curl -L -o javafx-sdk.${{ matrix.fx_ext }} "$DOWNLOAD_URL"
          
          if [ ! -s javafx-sdk.${{ matrix.fx_ext }} ]; then
            echo "Error: Downloaded file is empty or does not exist"
            exit 1
          fi
          
          echo "Extracting JavaFX SDK..."
          if [[ "${{ matrix.fx_ext }}" == "zip" ]]; then
            unzip -q javafx-sdk.${{ matrix.fx_ext }} -d .
          else
            tar -xzf javafx-sdk.${{ matrix.fx_ext }}
          fi
          
          rm javafx-sdk.${{ matrix.fx_ext }}
          
          # Find the extracted directory
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "javafx-sdk-*" | head -n 1)
          if [ -z "$EXTRACTED_DIR" ]; then
            echo "Error: Could not find extracted JavaFX SDK directory"
            exit 1
          fi
          
          # Rename only if needed
          EXPECTED_NAME="javafx-sdk-${{ env.FX_VERSION }}"
          if [ "$EXTRACTED_DIR" != "./$EXPECTED_NAME" ]; then
            echo "Renaming $EXTRACTED_DIR to $EXPECTED_NAME"
            mv "$EXTRACTED_DIR" "$EXPECTED_NAME"
          else
            echo "Directory already has expected name: $EXTRACTED_DIR"
          fi
          
          echo "JavaFX SDK ready at $EXPECTED_NAME"

      - name: List contents of JavaFX SDK (diagnostic)
        shell: bash
        run: |
          echo "Contents of javafx-sdk-${{ env.FX_VERSION }}:"
          ls -la javafx-sdk-${{ env.FX_VERSION }}/

      - name: Grant execute permission for gradlew (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Fat JAR
        shell: bash
        run: ./gradlew clean jar

      - name: Prepare paths for jpackage
        id: paths
        shell: bash
        run: |
          JAR_NAME=$(ls build/libs/*.jar | head -n1)
          echo "jar_name=${JAR_NAME##*/}" >> $GITHUB_OUTPUT
          echo "fx_lib=$(pwd)/javafx-sdk-${{ env.FX_VERSION }}/lib" >> $GITHUB_OUTPUT

      - name: Create portable app with jpackage
        shell: bash
        run: |
          jpackage \
            --input build/libs \
            --main-jar ${{ steps.paths.outputs.jar_name }} \
            --main-class com.optics.simulation.ui.SimulationFX \
            --module-path "${{ steps.paths.outputs.fx_lib }}" \
            --add-modules javafx.controls,javafx.graphics,javafx.base \
            --java-options '-Dprism.order=metal' \
            --name OpticsSimulation \
            --type ${{ matrix.jpackage_type }} \
            --dest ./

      - name: List files after jpackage (diagnostic)
        shell: bash
        run: |
          echo "Contents of current directory:"
          ls -la
          echo "Searching for OpticsSimulation* folders:"
          find . -maxdepth 1 -type d -name "OpticsSimulation*" || true

      - name: Rename app folder if needed (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -d "OpticsSimulation" ]; then
            echo "Folder OpticsSimulation exists."
          elif [ -d "OpticsSimulation.app" ]; then
            echo "Found OpticsSimulation.app, renaming to OpticsSimulation"
            mv OpticsSimulation.app OpticsSimulation
          else
            echo "Error: Neither OpticsSimulation nor OpticsSimulation.app found."
            exit 1
          fi

      - name: Zip portable app (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Zip portable app (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -r ${{ matrix.artifact_name }} OpticsSimulation/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error